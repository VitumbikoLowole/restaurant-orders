{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in · Tavola</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'menu/css/style.css' %}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand">Tavola<small>Menu &amp; Orders</small></div>
    <h1>Welcome back</h1>
    <p class="sub">Log in to manage the menu and take orders.</p>

    {% if form.errors %}
      <ul class="messages"><li class="error">Your username and password didn't match. Please try again.</li></ul>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="form-row">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
        </div>
      {% endfor %}
      <button class="btn btn-primary" type="submit">Log in</button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>

    <p class="auth-alt">No account? <a href="{% url 'register' %}">Register</a></p>
  </div>
</div>
</body>
</html>
