{% extends "menu/base.html" %}
{% block title %}Confirm delete · Tavola{% endblock %}

{% block content %}
<div class="page-head">
  <div><h1>Delete this record?</h1><p>This action cannot be undone.</p></div>
</div>

<form method="post" class="card">
  {% csrf_token %}
  <p>You are about to delete: <strong>{{ object }}</strong></p>
  <div class="form-actions">
    <button class="btn btn-danger" type="submit">Yes, delete</button>
    <a class="btn btn-ghost" href="javascript:history.back()">Cancel</a>
  </div>
</form>
{% endblock %}
