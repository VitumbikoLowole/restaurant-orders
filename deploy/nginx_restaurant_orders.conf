# Nginx site config for the Restaurant Orders project.
# Place at /etc/nginx/sites-available/restaurant_orders and symlink into
# sites-enabled, then `sudo nginx -t && sudo systemctl reload nginx`.
#
# Two jobs:
#   1. Serve /static/ and /media/ files directly off disk (fast, no Python).
#   2. Proxy every other request to Gunicorn over a UNIX socket.

server {
    listen 80;
    server_name your_server_ip_or_domain;

    client_max_body_size 10M;   # allow menu-item photo uploads

    # Collected static files (output of `python manage.py collectstatic`).
    location /static/ {
        alias /home/ubuntu/restaurant_orders/staticfiles/;
        access_log off;
        expires 30d;
    }

    # User-uploaded media (menu item photos live here).
    location /media/ {
        alias /home/ubuntu/restaurant_orders/media/;
        access_log off;
        expires 7d;
    }

    # Everything else -> Gunicorn.
    location / {
        include proxy_params;
        proxy_pass http://unix:/run/restaurant_orders.sock;
    }
}